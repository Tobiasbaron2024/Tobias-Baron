<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sicherheitsbericht</title>

    <!-- React & ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel für Inline-JSX-Transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- jsPDF & html2canvas -->
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f6fa;
      }
      h1,
      h2 {
        margin: 0 0 0.5rem 0;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1rem;
        display: flex;
        flex-wrap: wrap;
        gap: 1.5rem;
      }
      form {
        flex: 1 1 350px;
        background: #ffffff;
        border-radius: 1rem;
        padding: 1.5rem;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }
      label span {
        font-size: 0.85rem;
        font-weight: 600;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.25rem;
        border: 1px solid #cccccc;
        border-radius: 0.5rem;
        font-size: 1rem;
      }
      textarea {
        resize: vertical;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: #2563eb;
        color: #ffffff;
        padding: 0.6rem 1.2rem;
        border: none;
        border-radius: 0.6rem;
        font-size: 1rem;
        cursor: pointer;
      }
      .btn:hover {
        background: #1e4fd5;
      }
      /* Vorschau (DIN A4) */
      .preview-wrapper {
        flex: 1 1 350px;
        overflow: auto;
        max-height: calc(100vh - 2rem);
        background: #ffffff;
        border-radius: 1rem;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }
      .preview-page {
        width: 210mm;
        min-height: 297mm;
        margin: 0 auto;
        padding: 1.5rem 2rem;
      }
      .preview-page img {
        max-width: 100%;
        height: auto;
        border-radius: 1rem;
        border: 1px solid #ddd;
      }
      @media print {
        body {
          background: none;
        }
        form,
        .preview-wrapper {
          box-shadow: none;
        }
        .preview-wrapper {
          overflow: visible;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Die App als Inline-JSX -->
    <script type="text/babel">
      const { useState, useRef, useEffect, useMemo } = React;
      const { jsPDF } = window.jspdf;

      const DIN_A4_WIDTH = 210; // mm
      const STORAGE_KEY = "sicherheitsbericht_entwurf";

      function SicherheitsberichtApp() {
        const [reportType, setReportType] = useState("Unfallbericht");
        const [location, setLocation] = useState("");
        const [date, setDate] = useState("");
        const [time, setTime] = useState("");
        const [description, setDescription] = useState("");
        const [photoUrl, setPhotoUrl] = useState(null);

        const [baselineHeating, setBaselineHeating] = useState("");
        const [currentHeating, setCurrentHeating] = useState("");
        const [savedMoney, setSavedMoney] = useState("");
        const [savingsNotes, setSavingsNotes] = useState("");
        const [savingsEntries, setSavingsEntries] = useState([]);

        const previewRef = useRef(null);

        // Entwurf laden
        useEffect(() => {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          try {
            const data = JSON.parse(raw);
            setReportType(data.reportType || "Unfallbericht");
            setLocation(data.location || "");
            setDate(data.date || "");
            setTime(data.time || "");
            setDescription(data.description || "");
            setPhotoUrl(data.photoUrl || null);
            setBaselineHeating(data.baselineHeating || "");
            setCurrentHeating(data.currentHeating || "");
            setSavedMoney(data.savedMoney || "");
            setSavingsNotes(data.savingsNotes || "");
            setSavingsEntries(data.savingsEntries || []);
          } catch {}
        }, []);

        // Entwurf speichern
        useEffect(() => {
          const payload = {
            reportType,
            location,
            date,
            time,
            description,
            photoUrl,
            baselineHeating,
            currentHeating,
            savedMoney,
            savingsNotes,
            savingsEntries,
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        }, [
          reportType,
          location,
          date,
          time,
          description,
          photoUrl,
          baselineHeating,
          currentHeating,
          savedMoney,
          savingsNotes,
          savingsEntries,
        ]);

        const handlePhotoUpload = (e) => {
          const file = e.target.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => setPhotoUrl(ev.target.result);
          reader.readAsDataURL(file);
        };

        const parsedBaseline = parseFloat(baselineHeating);
        const parsedCurrent = parseFloat(currentHeating);

        const energySaved =
          !isNaN(parsedBaseline) && !isNaN(parsedCurrent)
            ? Math.max(0, parsedBaseline - parsedCurrent)
            : null;

        const percentSaved =
          !isNaN(parsedBaseline) && parsedBaseline > 0 && !isNaN(parsedCurrent)
            ? Math.max(0, ((parsedBaseline - parsedCurrent) / parsedBaseline) * 100)
            : null;

        const handleAddSavingsEntry = () => {
          if (isNaN(parsedBaseline) || isNaN(parsedCurrent)) return;
          const entry = {
            id: crypto.randomUUID(),
            date: date || new Date().toISOString().slice(0, 10),
            baseline: parsedBaseline,
            current: parsedCurrent,
            energySaved: Math.max(0, parsedBaseline - parsedCurrent),
            percentSaved:
              parsedBaseline > 0
                ? Math.max(0, ((parsedBaseline - parsedCurrent) / parsedBaseline) * 100)
                : 0,
            savedMoney: savedMoney || "0",
            notes: savingsNotes,
          };
          setSavingsEntries((prev) => [...prev, entry]);
          setSavingsNotes("");
        };

        const handleGeneratePdf = async () => {
          if (!previewRef.current) return;
          const canvas = await html2canvas(previewRef.current, { scale: 2, useCORS: true });
          const imgData = canvas.toDataURL("image/png");
          const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
          const imgProps = pdf.getImageProperties(imgData);
          const pdfWidth = DIN_A4_WIDTH;
          const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
          pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
          const filename = `${reportType}_${date || "Datum"}_${time || "Uhrzeit"}.pdf`;
          pdf.save(filename);
        };

        const autogeneratedText = useMemo(() => {
          if (!date && !time && !location && !description) return "—";
          switch (reportType) {
            case "Unfallbericht":
              return `Am ${date || "____"} um ${time || "____"} Uhr ereignete sich am/im ${location || "____"} ein Unfall.\nBetroffene/r: ______________________________________\nBeschreibung: ${description || "____"}\nMaßnahmen: _________________________________________`;
            case "Schadensmeldung":
              return `Schaden festgestellt am ${date || "____"} um ${time || "____"} Uhr, Standort: ${location || "____"}.\nBeschreibung des Schadens: ${description || "____"}\nSofortmaßnahmen: ___________________________________`;
            case "Beinahe-Unfall":
              return `Beinahe-Ereignis am ${date || "____"} um ${time || "____"} Uhr, Ort: ${location || "____"}.\nWas beinahe passiert wäre: ${description || "____"}\nVorbeugende Maßnahmen: ______________________________`;
            case "Dienstübergabe":
              return `Dienstübergabe am ${date || "____"} um ${time || "____"} Uhr.\nOrt/Posten: ${location || "____"}\nBesondere Vorkommnisse: ${description || "____"}`;
            default:
              return description || "—";
          }
        }, [reportType, date, time, location, description]);

        return (
          <div className="container">
            {/* Formular */}
            <form
              onSubmit={(e) => {
                e.preventDefault();
                handleGeneratePdf();
              }}
            >
              <h1>Sicherheitsbericht erstellen</h1>

              {/* Berichtstyp */}
              <label>
                <span>Berichtstyp</span>
                <select value={reportType} onChange={(e) => setReportType(e.target.value)} required>
                  <option>Unfallbericht</option>
                  <option>Schadensmeldung</option>
                  <option>Beinahe-Unfall</option>
                  <option>Dienstübergabe</option>
                </select>
              </label>

              {/* Datum/Uhrzeit */}
              <div style={{ display: "flex", gap: "0.75rem" }}>
                <label style={{ flex: 1 }}>
                  <span>Datum</span>
                  <input type="date" value={date} onChange={(e) => setDate(e.target.value)} required />
                </label>
                <label style={{ flex: 1 }}>
                  <span>Uhrzeit</span>
                  <input type="time" value={time} onChange={(e) => setTime(e.target.value)} required />
                </label>
              </div>

              {/* Ort */}
              <label>
                <span>Ort</span>
                <input
                  value={location}
                  onChange={(e) => setLocation(e.target.value)}
                  placeholder="z. B. Werkstor A"
                  required
                />
              </label>

              {/* Beschreibung */}
              <label>
                <span>Beschreibung / Details</span>
                <textarea
                  rows="6"
                  value={description}
                  onChange={(e) => setDescription(e.target.value)}
                  placeholder="Was genau ist passiert?"
                ></textarea>
              </label>

              {/* Foto */}
              <label>
                <span>Foto anhängen</span>
                <input type="file" accept="image/*" capture="environment" onChange={handlePhotoUpload} />
              </label>

              <hr style={{ margin: "1.5rem 0" }} />
              <h2>Heiz-Ersparnis erfassen</h2>
              <p style={{ marginTop: "0.25rem", color: "#4b5563" }}>
                Trage Referenz- und aktuellen Verbrauch ein, um die prozentuale Einsparung und
                deine Ersparnis zu verfolgen.
              </p>

              <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap" }}>
                <label style={{ flex: 1, minWidth: "180px" }}>
                  <span>Referenzverbrauch (z. B. kWh)</span>
                  <input
                    type="number"
                    min="0"
                    step="0.1"
                    value={baselineHeating}
                    onChange={(e) => setBaselineHeating(e.target.value)}
                    placeholder="z. B. 1200"
                  />
                </label>
                <label style={{ flex: 1, minWidth: "180px" }}>
                  <span>Aktueller Verbrauch</span>
                  <input
                    type="number"
                    min="0"
                    step="0.1"
                    value={currentHeating}
                    onChange={(e) => setCurrentHeating(e.target.value)}
                    placeholder="z. B. 980"
                  />
                </label>
              </div>

              <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap" }}>
                <label style={{ flex: 1, minWidth: "180px" }}>
                  <span>Ersparte Kosten (€)</span>
                  <input
                    type="number"
                    min="0"
                    step="0.01"
                    value={savedMoney}
                    onChange={(e) => setSavedMoney(e.target.value)}
                    placeholder="optional"
                  />
                </label>
                <label style={{ flex: 1, minWidth: "180px" }}>
                  <span>Notizen zur Einsparung</span>
                  <input
                    value={savingsNotes}
                    onChange={(e) => setSavingsNotes(e.target.value)}
                    placeholder="z. B. Thermostat gesenkt"
                  />
                </label>
              </div>

              <div style={{ background: "#f8fafc", borderRadius: "0.75rem", padding: "0.75rem", marginTop: "0.75rem" }}>
                <p style={{ margin: 0 }}>
                  <strong>Aktuelle Berechnung:</strong>
                </p>
                <p style={{ margin: "0.25rem 0" }}>
                  Eingespart: {energySaved !== null ? `${energySaved.toFixed(1)} Einheiten` : "—"}
                </p>
                <p style={{ margin: 0 }}>
                  Prozentual: {percentSaved !== null ? `${percentSaved.toFixed(1)} % weniger` : "—"}
                </p>
              </div>

              <div style={{ display: "flex", gap: "0.75rem", marginTop: "0.75rem", flexWrap: "wrap" }}>
                <button type="button" className="btn" onClick={handleAddSavingsEntry}>
                  Einsparung speichern
                </button>
              </div>

              {/* Aktion */}
              <button className="btn" type="submit">
                PDF erstellen
              </button>
            </form>

            {/* Vorschau */}
              <div className="preview-wrapper">
                <div className="preview-page" ref={previewRef}>
                  <h2 style={{ textAlign: "center" }}>{reportType}</h2>
                  <p>
                    <strong>Ort:</strong> {location || "—"}
                  </p>
                  <p>
                    <strong>Datum:</strong> {date || "—"} &nbsp; <strong>Uhrzeit:</strong> {time || "—"}
                  </p>
                  <p style={{ whiteSpace: "pre-wrap" }}>{autogeneratedText}</p>
                  <div style={{ marginTop: "1.5rem" }}>
                    <h3>Heiz-Ersparnis</h3>
                    <p style={{ marginTop: 0 }}>
                      Aktuelle Berechnung:{" "}
                      {percentSaved !== null
                        ? `${percentSaved.toFixed(1)} % weniger geheizt (≈ ${energySaved?.toFixed(1)} Einheiten)`
                        : "—"}
                      {savedMoney ? `, ${savedMoney} € gespart` : ""}
                    </p>
                    {savingsEntries.length > 0 ? (
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.95rem" }}>
                        <thead>
                          <tr>
                            <th style={{ textAlign: "left", borderBottom: "1px solid #e5e7eb", padding: "0.35rem 0" }}>
                              Datum
                            </th>
                            <th style={{ textAlign: "left", borderBottom: "1px solid #e5e7eb", padding: "0.35rem 0" }}>
                              Referenz
                            </th>
                            <th style={{ textAlign: "left", borderBottom: "1px solid #e5e7eb", padding: "0.35rem 0" }}>
                              Aktuell
                            </th>
                            <th style={{ textAlign: "left", borderBottom: "1px solid #e5e7eb", padding: "0.35rem 0" }}>
                              Ersparnis
                            </th>
                            <th style={{ textAlign: "left", borderBottom: "1px solid #e5e7eb", padding: "0.35rem 0" }}>
                              % weniger
                            </th>
                            <th style={{ textAlign: "left", borderBottom: "1px solid #e5e7eb", padding: "0.35rem 0" }}>
                              Notiz
                            </th>
                          </tr>
                        </thead>
                        <tbody>
                          {savingsEntries.map((entry) => (
                            <tr key={entry.id}>
                              <td style={{ padding: "0.35rem 0", borderBottom: "1px solid #f1f5f9" }}>{entry.date}</td>
                              <td style={{ padding: "0.35rem 0", borderBottom: "1px solid #f1f5f9" }}>
                                {entry.baseline}
                              </td>
                              <td style={{ padding: "0.35rem 0", borderBottom: "1px solid #f1f5f9" }}>
                                {entry.current}
                              </td>
                              <td style={{ padding: "0.35rem 0", borderBottom: "1px solid #f1f5f9" }}>
                                {entry.energySaved.toFixed(1)}
                                {entry.savedMoney ? ` | ${entry.savedMoney} €` : ""}
                              </td>
                              <td style={{ padding: "0.35rem 0", borderBottom: "1px solid #f1f5f9" }}>
                                {entry.percentSaved.toFixed(1)}%
                              </td>
                              <td style={{ padding: "0.35rem 0", borderBottom: "1px solid #f1f5f9" }}>
                                {entry.notes || "—"}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    ) : (
                      <p style={{ marginTop: "0.5rem", color: "#6b7280" }}>
                        Noch keine Einträge. Füge deine erste Einsparung hinzu.
                      </p>
                    )}
                  </div>
                  {photoUrl && (
                    <img src={photoUrl} alt="Angehängtes Foto" style={{ marginTop: "1rem", maxHeight: "120mm" }} />
                  )}
                </div>
              </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<SicherheitsberichtApp />);
    </script>
  </body>
</html>
